apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply plugin: 'kotlin-kapt'
apply plugin: 'kotlin-parcelize'
apply plugin: 'org.jetbrains.kotlin.android'

android {
    compileSdkVersion 34
    buildToolsVersion "30.0.3"

    defaultConfig {
        minSdkVersion 23
        targetSdkVersion 33

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        multiDexEnabled true
        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }
    buildFeatures {
        viewBinding true
        dataBinding true
        buildConfig = true
        resValues = true
        compose true
    }
    composeOptions {
        kotlinCompilerExtensionVersion = "1.3.1"
    }
    configurations {
        configureEach {
            exclude module: 'httpclient'
            exclude module: 'commons-logging'
        }
    }

    configurations.configureEach {
        resolutionStrategy.force "com.google.android.gms:play-services-measurement-base:20.1.2"
        resolutionStrategy.force "org.jetbrains.kotlin:kotlin-stdlib:1.7.10"
        resolutionStrategy.force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.7.10"
        resolutionStrategy.force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.7.10"
    }
}

tasks.configureEach { task ->
    /*if (task.name.equals("lint")) {
        //this is for speed up build
        task.enabled = false
    }*/
    if (task.name.contains("Test")) {
        //this is what you need
        task.enabled = false
    }
}

// This is the actual solution, as in https://stackoverflow.com/a/19037807/1002054
tasks.register('clearJar', Delete) {
    delete 'build/libs/myCompiledLibrary.jar'
}

//Actually created the .jar file
tasks.register('jar', Jar) {
    //from android.sourceSets.main.java
    from 'build/libs/'
    archiveName 'myCompiledLibrary.jar'
}

tasks.register('makeJar', Copy) {
    from('build/bundles/release/')
    into('build/libs/')
    include('classes.jar')
    rename('classes.jar', 'myCompiledLibrary.jar')
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar", "*.aar"])

    /* Core Android */
    implementation "androidx.core:core-ktx:1.6.0"
    implementation "androidx.multidex:multidex:2.0.1"

